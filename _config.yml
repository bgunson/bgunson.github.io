# Site settings
title: Bennett Gunson
email: bengunson@gmail.com
url: https://bgunson.github.io
description: "Bennett Gunson | Computer Science Student, Software Developer, Outdoorsman"
keywords: "computer scientist, software developer, web design, bgunson github, calgary, alberta, ucalgary"
skills: "Tinker - Learn - Create"
meta_author: Gunson Bennett

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: ff8f00 #80B3FF
  primary-rgb: "139, 195, 74" #"128,179,255"
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Bennett Gunson
  location: Location
  social: Around the Web
  credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: envelope
    url: mailto:bengunson@gmail.com
  - title: linkedin
    url: https://www.linkedin.com/in/bennett-gunson-1abb92205/
  - title: github
    url: https://github.com/bgunson

# Postal address (add as many lines as necessary)
address:
  - line: Calgary, Alberta, Canada

# Credits content
credits: 'Forked from the <a href="https://github.com/jeromelachaud/freelancer-theme">Freelancer</a> theme, built with <a href="https://jekyllrb.com/">Jekyll</a> '

# Build settings
